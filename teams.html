<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cyan:#17d4e8;
  --cyan-dim:rgba(23,212,232,0.12);
  --cyan-border:rgba(23,212,232,0.25);
  --bg:#0a0c10;
  --surface:#111318;
  --surface2:#181c24;
  --border:rgba(255,255,255,0.07);
  --text:#e4e8f0;
  --muted:#5a6275;
  --muted2:#3a3f52;
}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;min-height:100vh}

/* NAV */
nav{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);padding:0 32px;height:56px;position:sticky;top:0;background:rgba(10,12,16,0.95);backdrop-filter:blur(8px);z-index:100}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-right:32px}
.nav-logo img{height:28px;width:auto}
.nav-wordmark{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--cyan);letter-spacing:0.04em}
.nav-links{display:flex;gap:0}
.nav-link{color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:0 16px;height:56px;display:flex;align-items:center;border-bottom:2px solid transparent;transition:color 0.15s,border-color 0.15s;letter-spacing:0.03em}
.nav-link:hover{color:var(--text)}
.nav-link.active{color:var(--cyan);border-bottom-color:var(--cyan)}

/* HEADER */
.header{padding:32px 32px 0}
.tournament-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.12em;color:var(--cyan);text-transform:uppercase;margin-bottom:6px}
.tournament-title{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;color:#fff;letter-spacing:0.02em;line-height:1}

/* TOOLBAR */
.toolbar{padding:20px 32px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:320px}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);width:15px;height:15px}
#search{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px 8px 34px;color:var(--text);font-size:13px;font-family:'Barlow',sans-serif;outline:none;transition:border-color 0.15s}
#search::placeholder{color:var(--muted2)}
#search:focus{border-color:var(--cyan-border)}
.sort-select{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;font-family:'Barlow',sans-serif;outline:none;cursor:pointer}
.sort-select:focus{border-color:var(--cyan-border)}
.team-count{font-size:12px;color:var(--muted);margin-left:auto}
.team-count span{color:var(--cyan);font-weight:600}

/* GRID */
.grid{columns:280px;column-gap:12px;padding:0 32px 48px}

/* TEAM CARD */
.team-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;transition:border-color 0.15s;cursor:pointer;break-inside:avoid;margin-bottom:12px;display:block}
.team-card:hover{border-color:var(--cyan-border);transform:translateY(-2px)}
.team-card.expanded .card-body{max-height:600px;padding:0 16px 14px;border-top:1px solid var(--border)}
.card-header{padding:14px 16px;display:flex;align-items:center;gap:12px}
.team-abbr{width:38px;height:38px;border-radius:7px;background:var(--cyan-dim);border:1px solid var(--cyan-border);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;color:var(--cyan);letter-spacing:0.05em;flex-shrink:0}
.team-abbr.shitlist{background:rgba(255,80,80,0.1);border-color:rgba(255,80,80,0.25);color:#ff5050}
.card-title-wrap{flex:1;min-width:0}
.team-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:#fff;letter-spacing:0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-meta{font-size:11px;color:var(--muted);margin-top:1px}
.shitlist-badge{font-size:9px;font-weight:700;background:rgba(255,80,80,0.15);color:#ff5050;border:1px solid rgba(255,80,80,0.3);border-radius:3px;padding:1px 5px;letter-spacing:0.06em;text-transform:uppercase;margin-left:6px;vertical-align:middle}
.expand-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:color 0.15s,background 0.15s}
.expand-btn:hover{color:var(--text);background:var(--surface2)}
.expand-btn svg{width:16px;height:16px;transition:transform 0.2s}
.team-card.expanded .expand-btn svg{transform:rotate(180deg)}

.card-body{max-height:0;overflow:hidden;padding:0 16px;border-top:0px solid var(--border);transition:max-height 0.25s ease,padding 0.2s ease,border-top 0.2s ease}
.roster-section{margin-top:12px}
.roster-section-label{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.players-list{display:flex;flex-direction:column;gap:3px}
.player-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.player-dot{width:5px;height:5px;border-radius:50%;background:var(--muted2);flex-shrink:0}
.player-dot.captain{background:var(--cyan)}
.player-name{font-size:12px;color:var(--text);font-family:'Barlow',sans-serif}
.player-name.captain{color:var(--cyan)}
.captain-star{font-size:10px;color:var(--cyan);margin-left:2px}
.sub-row .player-dot{background:var(--muted2);opacity:0.5}
.sub-row .player-name{color:var(--muted)}
.emerg-row .player-name{color:var(--muted2)}
.staff-row{display:flex;align-items:center;gap:8px;padding:2px 0}
.staff-label{font-size:10px;color:var(--muted2);min-width:50px}
.staff-name{font-size:11px;color:var(--muted)}
.none-text{font-size:11px;color:var(--muted2);font-style:italic}
.divider{height:1px;background:var(--border);margin:10px 0}

.no-results{grid-column:1/-1;text-align:center;padding:48px;color:var(--muted)}
.no-results p{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--muted);margin-bottom:4px}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:11px}
footer a{color:var(--muted);text-decoration:none}
footer a:hover{color:var(--cyan)}
</style>

  {abbr:"YT",name:"yung thug",captain:"Entri#Tammy",roster:["Shrony#444","tecsyrup#8654","Entri#Tammy","awfuh and me#xkrz","sʍʍ#222"],subs:["S2A#sheet"],emergency:"xzy2#一千年",coach:null,acoach:null},
  {abbr:"ZOD",name:"Zodiac Esports",captain:"Knock27#2727",roster:["asura#PHL","greg#craig","Knock27#2727","Frostesz#Joey","Mob#oobie"],subs:["ICE AGE MONSTER#SID"],emergency:null,coach:"Gjorgji#bob",acoach:null}
];

let filtered = [...teams];

function renderGrid() {
  const grid = document.getElementById('grid');
  document.getElementById('count').textContent = filtered.length;
  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results"><p>No teams found</p><span>Try a different search</span></div>';
    return;
  }
  grid.innerHTML = filtered.map((t,i) => {
    const isShitlist = t.shitlist;
    return `<div class="team-card" id="card-${i}" onclick="toggle(${i})">
      <div class="card-header">
        <div class="team-abbr${isShitlist?' shitlist':''}">${t.abbr}</div>
        <div class="card-title-wrap">
          <div class="team-name">${t.name}${isShitlist?'<span class="shitlist-badge">shitlist</span>':''}</div>
          <div class="team-meta">5 players · ${t.subs&&t.subs.length?t.subs.length+' sub'+(t.subs.length>1?'s':''):' no subs'} · ${t.coach?'coached':'no coach'}</div>
        </div>
        <button class="expand-btn" aria-label="Expand roster">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
      <div class="card-body">
        <div class="roster-section">
          <div class="roster-section-label">Roster</div>
          <div class="players-list">
            ${t.roster.map(p => {
              const isCap = p === t.captain;
              return `<div class="player-row${isCap?' captain-row':''}">
                <div class="player-dot${isCap?' captain':''}"></div>
                <div class="player-name${isCap?' captain':''}">${p}${isCap?'<span class="captain-star">★</span>':''}</div>
              </div>`;
            }).join('')}
          </div>
        </div>
        ${t.subs && t.subs.length ? `<div class="divider"></div>
        <div class="roster-section">
          <div class="roster-section-label">Substitutes</div>
          <div class="players-list">
            ${t.subs.map(p=>`<div class="player-row sub-row"><div class="player-dot"></div><div class="player-name">${p}</div></div>`).join('')}
          </div>
        </div>` : ''}
        ${t.emergency ? `<div class="roster-section" style="margin-top:8px">
          <div class="roster-section-label">Emergency Sub</div>
          <div class="player-row emerg-row"><div class="player-dot"></div><div class="player-name">${t.emergency}</div></div>
        </div>` : ''}
        <div class="divider"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
          <div class="staff-row"><span class="staff-label">Coach</span><span class="${t.coach?'staff-name':'none-text'}">${t.coach||'None'}</span></div>
          <div class="staff-row"><span class="staff-label">Asst.</span><span class="${t.acoach?'staff-name':'none-text'}">${t.acoach||'None'}</span></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggle(i) {
  const cards = document.querySelectorAll('.team-card');
  const target = document.getElementById('card-'+i);
  const isOpen = target.classList.contains('expanded');
  cards.forEach(c => c.classList.remove('expanded'));
  if (!isOpen) target.classList.add('expanded');
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort').value;
  filtered = teams.filter(t => {
    if (!q) return true;
    return t.name.toLowerCase().includes(q) ||
      t.abbr.toLowerCase().includes(q) ||
      t.roster.some(p => p.toLowerCase().includes(q)) ||
      (t.subs||[]).some(p => p.toLowerCase().includes(q));
  });
  filtered.sort((a,b) => sort === 'alpha-desc' ? b.name.localeCompare(a.name) : a.name.localeCompare(b.name));
  renderGrid();
}

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('sort').addEventListener('change', applyFilters);

renderGrid();
</script>
</body>
</html>
