*{box-sizing:border-box;margin:0;padding:0}
:root{

  --surface2:#1c2130;
  --border:rgba(255,255,255,0.08);
  --text:#dde2ee;
  --muted:#6b7590;
  --muted2:#3d4560;
  --red:rgba(255,60,60,0.9);
  --red-dim:rgba(255,60,60,0.1);
  --red-border:rgba(255,60,60,0.3);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;min-height:100vh}

/* NAV */
nav{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);padding:0 24px;height:52px;position:sticky;top:0;background:rgba(14,16,21,0.97);backdrop-filter:blur(10px);z-index:100}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-right:8px}
.nav-logo img{height:24px;width:auto}
.nav-wordmark{font-size:14px;font-weight:700;color:var(--cyan);letter-spacing:0.06em}
.nav-sep{width:1px;height:20px;background:var(--border);margin:0 8px}
.nav-links{display:flex;gap:0}
.nav-link{color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:0 14px;height:52px;display:flex;align-items:center;border-bottom:2px solid transparent;transition:color 0.15s;letter-spacing:0.01em}
.nav-link:hover{color:var(--text)}
.nav-link.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.nav-tournament{display:flex;align-items:center;gap:6px;margin-left:auto;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface)}
.nav-tournament img{height:18px}
.nav-tournament svg{width:14px;height:14px;color:var(--muted)}

/* PAGE HEADER */
.page-header{padding:24px 24px 0;display:flex;align-items:baseline;justify-content:space-between}
.page-title{font-size:28px;font-weight:700;color:#fff;letter-spacing:-0.02em}

/* TOOLBAR */
.toolbar{padding:16px 24px;display:flex;align-items:center;gap:10px}
.search-wrap{position:relative;flex:1;max-width:340px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);width:14px;height:14px;pointer-events:none}
#search{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 10px 7px 32px;color:var(--text);font-size:12px;font-family:'Inter',sans-serif;outline:none}
#search::placeholder{color:var(--muted2)}
#search:focus{border-color:var(--cyan-border)}
.sort-label{font-size:12px;color:var(--muted);white-space:nowrap}
.sort-select{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;font-family:'Inter',sans-serif;outline:none;cursor:pointer}
.sort-select:focus{border-color:var(--cyan-border)}
.team-count{font-size:12px;color:var(--muted);margin-left:auto;white-space:nowrap}
.team-count span{color:var(--cyan);font-weight:600}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px;padding:0 24px 48px;align-items:start}

/* CARD */
.team-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:visible;cursor:pointer;transition:border-color 0.15s}
.team-card:hover{border-color:rgba(255,255,255,0.15)}
.team-card.shitlist-card{border-color:var(--red-border)}
.team-card.shitlist-card:hover{border-color:var(--red)}

/* CARD HEADER */
.card-header{padding:12px 14px;display:flex;align-items:center;gap:10px}
.team-abbr{width:34px;height:34px;border-radius:6px;background:var(--cyan-dim);border:1px solid var(--cyan-border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--cyan);letter-spacing:0.04em;flex-shrink:0}
.team-abbr.red{background:var(--red-dim);border-color:var(--red-border);color:var(--red)}
.card-title-wrap{flex:1;min-width:0}
.team-name{font-size:14px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shitlist-tag{font-size:9px;font-weight:600;background:var(--red-dim);color:var(--red);border:1px solid var(--red-border);border-radius:3px;padding:1px 5px;letter-spacing:0.05em;text-transform:uppercase;margin-left:5px;vertical-align:middle}
.seed-num{font-size:12px;color:var(--muted);flex-shrink:0}
.collapse-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px;display:flex;align-items:center;border-radius:3px}
.collapse-btn svg{width:14px;height:14px;transition:transform 0.2s}
.team-card.collapsed .collapse-btn svg{transform:rotate(-90deg)}

/* CARD BODY */
.card-body{padding:0 14px 12px;border-top:1px solid var(--border)}
.card-cols{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;margin-top:10px}
.col-label{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.player{font-size:11px;color:var(--text);padding:2px 0;line-height:1.4}
.player.captain{color:var(--cyan)}
.player.sub{color:var(--muted)}
.player.emerg{color:var(--muted2)}
.card-divider{height:1px;background:var(--border);margin:10px 0}
.staff-row{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.staff-item{}
.staff-item .col-label{margin-bottom:3px}
.staff-val{font-size:11px;color:var(--muted)}
.staff-val.none{color:var(--muted2);font-style:italic}
.team-card.collapsed .card-body{display:none}

.no-results{grid-column:1/-1;text-align:center;padding:60px;color:var(--muted);font-size:14px}
footer{border-top:1px solid var(--border);padding:16px 24px;color:var(--muted);font-size:11px;display:flex;justify-content:space-between}
footer a{color:var(--muted);text-decoration:none}
</style>

let filtered = [...teams];

function renderGrid() {
  document.getElementById('count').textContent = filtered.length;
  const grid = document.getElementById('grid');
  if (!filtered.length) { grid.innerHTML = '<div class="no-results">No teams found</div>'; return; }
  grid.innerHTML = filtered.map((t,i) => {
    const sl = t.shitlist;
    const s = seeds[t.name] ? `(${seeds[t.name]})` : '';
    const rosterHtml = t.roster.map(p => `<div class="player${p===t.captain?' captain':''}">${p}${p===t.captain?' ★':''}</div>`).join('');
    const subsHtml = t.subs && t.subs.length ? t.subs.map(p=>`<div class="player sub">${p}</div>`).join('') : '<div class="player sub" style="color:var(--muted2);font-style:italic">None</div>';
    const emergHtml = t.emergency ? `<div class="player emerg">${t.emergency}</div>` : `<div class="player emerg" style="font-style:italic">None approved</div>`;
    return `<div class="team-card${sl?' shitlist-card':''}" id="card-${i}">
      <div class="card-header" onclick="toggle(${i})">
        <div class="team-abbr${sl?' red':''}">${t.abbr}</div>
        <div class="card-title-wrap">
          <div class="team-name">${t.name}${sl?'<span class="shitlist-tag">shitlist</span>':''}</div>
        </div>
        <span class="seed-num">${s}</span>
        <button class="collapse-btn" aria-label="Toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
      <div class="card-body">
        <div class="card-cols">
          <div>
            <div class="col-label">Roster</div>
            ${rosterHtml}
          </div>
          <div>
            <div class="col-label">Subs</div>
            ${subsHtml}
          </div>
        </div>
        <div class="card-divider"></div>
        <div class="col-label" style="margin-bottom:4px">Captain</div>
        <div class="player captain" style="margin-bottom:10px">${t.captain}</div>
        <div class="col-label" style="margin-bottom:4px">Emergency Subs</div>
        <div style="margin-bottom:10px">${emergHtml}</div>
        <div class="staff-row">
          <div class="staff-item"><div class="col-label">Coach</div><div class="staff-val${t.coach?'':' none'}">${t.coach||'None'}</div></div>
          <div class="staff-item"><div class="col-label">Assistant Coach</div><div class="staff-val${t.acoach?'':' none'}">${t.acoach||'None'}</div></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggle(i) {
  document.getElementById('card-'+i).classList.toggle('collapsed');
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort').value;
  filtered = teams.filter(t => {
    if (!q) return true;
    return t.name.toLowerCase().includes(q) || t.abbr.toLowerCase().includes(q) ||
      t.roster.some(p=>p.toLowerCase().includes(q)) ||
      (t.subs||[]).some(p=>p.toLowerCase().includes(q)) ||
      (t.coach||'').toLowerCase().includes(q) || (t.acoach||'').toLowerCase().includes(q);
  });
  if (sort==='alpha-desc') filtered.sort((a,b)=>b.name.localeCompare(a.name));
  else if (sort==='seed') filtered.sort((a,b)=>(seeds[a.name]||999)-(seeds[b.name]||999));
  else if (sort==='seed-desc') filtered.sort((a,b)=>(seeds[b.name]||999)-(seeds[a.name]||999));
  else filtered.sort((a,b)=>a.name.localeCompare(b.name));
  renderGrid();
}

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('sort').addEventListener('change', applyFilters);
renderGrid();
</script>
